<head>
    <meta charset="UTF-8">
    <title>Transform Controls</title>
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"
      }
    }
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-family: monospace;
            font-size: 13px;
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 6px;
            z-index: 100;
            pointer-events: none;
            line-height: 1.8;
        }
    </style>
</head>
<body>

    <div id="info">
        "W" translate | "E" rotate | "R" scale | "+/-" adjust size<br>
        "Q" toggle world/local space | "Shift" snap to grid<br>
        "X" toggle X | "Y" toggle Y | "Z" toggle Z | "Spacebar" toggle enabled<br>
        "Esc" reset current transform<br>
        "C" toggle camera | "V" random zoom
    </div>

    <div id="app"></div>

    <script type="module" src="../assets/js/scenarios/transform.js"></script>

</body>
