<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pointer Lock</title>
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"
      }
    }
    </script>
    <style>
        body { margin: 0; overflow: hidden; }

        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        #instructions {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <p style="font-size:36px">Click para jugar</p>
            <p>WASD — moverse<br/>Mouse — mirar<br/>Espacio — saltar</p>
        </div>
    </div>

    <script type="module" src="../assets/js/scenarios/pointerlock.js"></script>

</body>
</html>
